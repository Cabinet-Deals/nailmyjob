name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [scan_js]

    environment:
      name: production
      url: https://nailmyjob.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "kamal_destination=" >> $GITHUB_OUTPUT

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/keys/hetzner
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/keys/hetzner/nailmyjob
          chmod 600 ~/.ssh/keys/hetzner/nailmyjob
          cat << 'EOF' > ~/.ssh/config
          Host 5.161.21.106
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to ${{ steps.vars.outputs.environment }} with Kamal
        env:
          RAILS_ENV: production
          # Read-only Doppler service token (project: nailmyjob / config: prd). Migrated from Bitwarden 2026-07-03.
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/keys/hetzner/nailmyjob
          bundle exec kamal deploy ${{ steps.vars.outputs.kamal_destination }}
